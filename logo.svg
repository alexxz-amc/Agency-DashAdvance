<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 64" fill="none" role="img" aria-label="DashAdvance">
  <!-- Speed streaks — D side -->
  <rect x="19" y="10" width="20" height="3"   rx="1.5"  fill="#F4B400"/>
  <rect x="19" y="17" width="26" height="2.5" rx="1.25" fill="#F4B400" opacity=".7"/>
  <rect x="19" y="24" width="17" height="2"   rx="1"    fill="#F4B400" opacity=".42"/>

  <!-- Speed streaks — A side -->
  <rect x="58" y="10" width="20" height="3"   rx="1.5"  fill="#F4B400"/>
  <rect x="58" y="17" width="26" height="2.5" rx="1.25" fill="#F4B400" opacity=".7"/>
  <rect x="58" y="24" width="17" height="2"   rx="1"    fill="#F4B400" opacity=".42"/>

  <!-- D and A bold letters -->
  <text x="0" y="47"
    font-family="'Arial Black','Haettenschweiler',Impact,sans-serif"
    font-weight="900" font-size="44" fill="white">D</text>
  <text x="48" y="47"
    font-family="'Arial Black','Haettenschweiler',Impact,sans-serif"
    font-weight="900" font-size="44" fill="white">A</text>

  <!-- AGENCIA DIGITAL caption -->
  <text x="0" y="61"
    font-family="Arial,Helvetica,sans-serif"
    font-size="6" font-weight="500"
    letter-spacing="3" fill="rgba(255,255,255,.52)">AGENCIA DIGITAL</text>
</svg>
