<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 114 76" fill="none" role="img" aria-label="DashAdvance">
  <!-- D: compound path with evenodd so the hollow is transparent -->
  <path fill-rule="evenodd" clip-rule="evenodd"
    d="M7,12 H22 C41,12 49,22 49,34 C49,46 41,56 22,56 H7 Z
       M14,20 H21 C33,20 41,27 41,34 C41,41 33,48 21,48 H14 Z"
    fill="white"/>

  <!-- Yellow speed streaks -->
  <rect x="30" y="20" width="60" height="5.5" rx="1.5" fill="#F4B400"/>
  <rect x="30" y="29" width="74" height="4.5" rx="1.5" fill="#F4B400" opacity=".78"/>
  <rect x="30" y="37" width="54" height="4"   rx="1.5" fill="#F4B400" opacity=".52"/>

  <!-- A: left leg white, right leg gold, crossbar white -->
  <polygon points="56,56 70,12 78,12 64,56" fill="white"/>
  <polygon points="78,12 86,12 101,56 88,56" fill="#F4B400"/>
  <rect x="62" y="36" width="27" height="7" rx="1" fill="white"/>

  <!-- AGENCIA DIGITAL caption -->
  <text x="57" y="72" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif"
    font-size="6" font-weight="400"
    letter-spacing="2.8" fill="rgba(255,255,255,.52)">AGENCIA DIGITAL</text>
</svg>
